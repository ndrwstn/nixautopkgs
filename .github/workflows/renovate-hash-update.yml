name: Update Package Hashes on Renovate PRs

on:
  pull_request:
    branches: [master]
    paths:
      - "packages/gcs/default.nix"
      - "packages/clamav/default.nix"
      - ".github/workflows/renovate-hash-update.yml"

concurrency:
  group: renovate-hash-update-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  update-package-hashes:
    if: startsWith(github.head_ref, 'update/') && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      checks: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@d96bc962e61b3049ce8128d03d57a1144fa96539 # main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@cec65ff6f104850203b152861d3f9e5f1747885d # main

      - name: Assert Renovate branch context
        run: |
          echo "head_ref=${GITHUB_HEAD_REF}"
          echo "head_repo=${{ github.event.pull_request.head.repo.full_name }}"
          echo "base_repo=${{ github.repository }}"
          [[ "${GITHUB_HEAD_REF}" == update/* ]]
          [[ "${{ github.event.pull_request.head.repo.full_name }}" == "${{ github.repository }}" ]]

      - name: Detect package paths updated in PR
        id: detect-packages
        run: |
          git fetch origin "${{ github.base_ref }}:${{ github.base_ref }}"
          CHANGED_FILES="$(git diff --name-only "${{ github.base_ref }}...HEAD")"

          echo "Changed files:"
          printf '%s\n' "$CHANGED_FILES"

          run_gcs=false
          run_clamav=false

          if printf '%s\n' "$CHANGED_FILES" | grep -qx "packages/gcs/default.nix"; then
            run_gcs=true
          fi

          if printf '%s\n' "$CHANGED_FILES" | grep -qx "packages/clamav/default.nix"; then
            run_clamav=true
          fi

          echo "run_gcs=$run_gcs" >> "$GITHUB_OUTPUT"
          echo "run_clamav=$run_clamav" >> "$GITHUB_OUTPUT"

      - name: Update gcs hashes
        if: steps.detect-packages.outputs.run_gcs == 'true'
        run: nix run nixpkgs#nix-update -- --flake --version=skip gcs

      - name: Update clamav hashes
        if: steps.detect-packages.outputs.run_clamav == 'true'
        run: nix run nixpkgs#nix-update -- --flake --version=skip clamav

      - name: Commit and push changes
        id: commit-push
        run: |
          if [[ "${{ steps.detect-packages.outputs.run_gcs }}" != "true" && "${{ steps.detect-packages.outputs.run_clamav }}" != "true" ]]; then
            echo "No updateable package paths changed in PR"
            echo "new_sha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No hash changes detected"
            echo "new_sha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/gcs/default.nix packages/clamav/default.nix
          git commit -m "chore: update package hashes"
          git push
          echo "new_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Report check status on latest commit
        if: steps.commit-push.outputs.new_sha != ''
        uses: LouisBrunner/checks-action@6b626ffbad7cc56fd58627f774b9067e6118af23 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: renovate-hash-update
          sha: ${{ steps.commit-push.outputs.new_sha }}
          conclusion: success
