name: Update ocrit hashes on Renovate PRs (Darwin)

on:
  pull_request:
    branches: [master]
    paths:
      - "packages/ocrit/default.nix"
      - ".github/workflows/renovate-hash-update-darwin.yml"

concurrency:
  group: renovate-hash-update-darwin-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  update-ocrit-hashes:
    if: startsWith(github.head_ref, 'update/') && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: macos-15
    permissions:
      contents: write
      checks: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@b6e4494ddccc51b56de1189099089a3514a69245 # main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@3c034b51a9deec0a09ef1df8b436ac5db50fae94 # main

      - name: Assert Renovate branch context
        run: |
          echo "head_ref=${GITHUB_HEAD_REF}"
          echo "head_repo=${{ github.event.pull_request.head.repo.full_name }}"
          echo "base_repo=${{ github.repository }}"
          [[ "${GITHUB_HEAD_REF}" == update/* ]]
          [[ "${{ github.event.pull_request.head.repo.full_name }}" == "${{ github.repository }}" ]]

      - name: Update ocrit hashes
        run: nix run nixpkgs#nix-update -- --flake --version=skip ocrit

      - name: Build ocrit package
        run: nix build .#ocrit

      - name: Commit and push changes
        id: commit-push
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No hash changes detected"
            echo "new_sha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/ocrit/default.nix
          git commit -m "chore: update ocrit hashes"
          git push
          echo "new_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Report check status on latest commit
        if: steps.commit-push.outputs.new_sha != ''
        uses: LouisBrunner/checks-action@937cbbcde3259005b50746dc91cde29098aac2ff # v3.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: update-hashes-darwin
          sha: ${{ steps.commit-push.outputs.new_sha }}
          conclusion: success
