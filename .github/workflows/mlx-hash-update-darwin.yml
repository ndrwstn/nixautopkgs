name: Update mlx hashes on Renovate PRs (Darwin)

on:
  pull_request:
    branches: [master]
    paths:
      - "packages/mlx/default.nix"
      - "packages/mlx-lm/default.nix"
      - ".github/workflows/mlx-hash-update-darwin.yml"

concurrency:
  group: mlx-hash-update-darwin-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  update-mlx-hashes:
    if: startsWith(github.head_ref, 'update/') && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: macos-26
    permissions:
      contents: write
      checks: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@4a754ab0c192f4d12cf88b5954b9dd13fd2d612e # main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@5626df0a8b8f16cb060538f6d3041500a2d10cb0 # main

      - name: Assert Renovate branch context
        run: |
          echo "head_ref=${GITHUB_HEAD_REF}"
          echo "head_repo=${{ github.event.pull_request.head.repo.full_name }}"
          echo "base_repo=${{ github.repository }}"
          [[ "${GITHUB_HEAD_REF}" == update/* ]]
          [[ "${{ github.event.pull_request.head.repo.full_name }}" == "${{ github.repository }}" ]]

      - name: Detect package paths updated in PR
        id: detect-packages
        run: |
          git fetch origin "${{ github.base_ref }}:${{ github.base_ref }}"
          CHANGED_FILES="$(git diff --name-only "${{ github.base_ref }}...HEAD")"

          echo "Changed files:"
          printf '%s\n' "$CHANGED_FILES"

          run_mlx=false
          run_mlx_lm=false

          if printf '%s\n' "$CHANGED_FILES" | grep -qx "packages/mlx/default.nix"; then
            run_mlx=true
          fi

          if printf '%s\n' "$CHANGED_FILES" | grep -qx "packages/mlx-lm/default.nix"; then
            run_mlx_lm=true
          fi

          echo "run_mlx=$run_mlx" >> "$GITHUB_OUTPUT"
          echo "run_mlx_lm=$run_mlx_lm" >> "$GITHUB_OUTPUT"

      - name: Update mlx hashes
        if: steps.detect-packages.outputs.run_mlx == 'true'
        run: nix run nixpkgs#nix-update -- --flake --version=skip mlx

      - name: Update mlx-lm hashes
        if: steps.detect-packages.outputs.run_mlx_lm == 'true'
        run: nix run nixpkgs#nix-update -- --flake --version=skip mlx-lm

      - name: Build mlx package
        if: steps.detect-packages.outputs.run_mlx == 'true' || steps.detect-packages.outputs.run_mlx_lm == 'true'
        run: nix build .#mlx

      - name: Build mlx-lm package
        if: steps.detect-packages.outputs.run_mlx == 'true' || steps.detect-packages.outputs.run_mlx_lm == 'true'
        run: nix build .#mlx-lm

      - name: Commit and push changes
        id: commit-push
        run: |
          if [[ "${{ steps.detect-packages.outputs.run_mlx }}" != "true" && "${{ steps.detect-packages.outputs.run_mlx_lm }}" != "true" ]]; then
            echo "No updateable package paths changed in PR"
            echo "new_sha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No hash changes detected"
            echo "new_sha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/mlx/default.nix packages/mlx-lm/default.nix
          git commit -m "chore: update mlx package hashes"
          git push
          echo "new_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Report check status on latest commit
        if: steps.commit-push.outputs.new_sha != ''
        uses: LouisBrunner/checks-action@937cbbcde3259005b50746dc91cde29098aac2ff # v3.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: update-mlx-hashes-darwin
          sha: ${{ steps.commit-push.outputs.new_sha }}
          conclusion: success
